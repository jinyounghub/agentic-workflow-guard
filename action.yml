name: Agentic Workflow Guard
description: Detect Agentic Workflow Injection risks in AI-powered GitHub Actions workflows.
author: agentic-workflow-guard contributors
inputs:
  paths:
    description: Workflow file or directory paths to scan. Supports comma or newline separated values.
    required: false
    default: .github/workflows
  fail-on:
    description: Minimum severity that fails the action. One of low, medium, high, critical, never.
    required: false
    default: high
  format:
    description: Report format. One of markdown, json, sarif.
    required: false
    default: sarif
  output:
    description: Path to write the report.
    required: false
    default: awi-guard.sarif
  upload-sarif:
    description: Deprecated placeholder. Use github/codeql-action/upload-sarif in a following step.
    required: false
    default: "false"
  config:
    description: Optional awi-guard.config.yml file for rule config, excludes, and suppressions.
    required: false
  baseline:
    description: Optional awi-guard.baseline.json file for accepted existing findings.
    required: false
  github-token:
    description: Optional GitHub token for future integrations. The deterministic scanner does not require it.
    required: false
outputs:
  report-path:
    description: Absolute path to the generated Markdown, JSON, or SARIF report.
  findings:
    description: Total number of findings, including suppressed and baselined findings.
  critical:
    description: Number of active critical-severity findings.
  high:
    description: Number of active high-severity findings.
  medium:
    description: Number of active medium-severity findings.
  low:
    description: Number of active low-severity findings.
runs:
  using: node20
  main: dist/action/index.js
branding:
  icon: shield
  color: purple
