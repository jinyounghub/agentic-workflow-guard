name: Contributor Friendly Untrusted Issue Prompt

on:
  issues:
    types: [opened]

permissions:
  contents: read

jobs:
  triage:
    runs-on: ubuntu-latest
    steps:
      - uses: openai/codex-action@v1
        with:
          prompt: "Summarize this synthetic issue: ${{ github.event.issue.body }}"
