name: Vulnerable issue prompt

on:
  issues:
    types: [opened]

permissions:
  contents: read

jobs:
  triage:
    runs-on: ubuntu-latest
    steps:
      - name: Ask Codex to triage the issue
        id: codex
        uses: openai/codex-action@v1
        with:
          prompt: "Triage this issue: ${{ github.event.issue.body }}"
