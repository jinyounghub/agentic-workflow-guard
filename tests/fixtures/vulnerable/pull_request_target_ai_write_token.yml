name: Pull request target AI with write token

on:
  pull_request_target:

permissions:
  contents: write
  pull-requests: write

jobs:
  agent:
    runs-on: ubuntu-latest
    steps:
      - name: Run agent in privileged PR target context
        id: codex
        uses: openai/codex-action@v1
        with:
          prompt: "Inspect the pull request."
